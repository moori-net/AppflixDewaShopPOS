name: Release on Flutter version change

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Optional: Version manuell angeben, z. B. 6.7.3+4. Leer lassen = pubspec.yaml verwenden"
        required: false
        type: string

  push:
    branches:
      - main
    paths:
      - pubspec.yaml

permissions:
  contents: write

jobs:
  release:
    name: Build and create release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            NEW_VERSION="${{ github.event.inputs.version }}"
          else
            NEW_VERSION=$(grep '^version:' pubspec.yaml | sed 's/version:[[:space:]]*//')
          fi

          VERSION_NAME=$(echo "$NEW_VERSION" | cut -d'+' -f1)
          BUILD_NUMBER=$(echo "$NEW_VERSION" | cut -d'+' -f2)

          if [ -z "$VERSION_NAME" ] || [ -z "$BUILD_NUMBER" ]; then
            echo "Invalid version format: $NEW_VERSION"
            echo "Expected format: 6.7.2+3"
            exit 1
          fi

          TAG="v${VERSION_NAME}-build.${BUILD_NUMBER}"

          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          echo "Version: $NEW_VERSION"
          echo "Version name: $VERSION_NAME"
          echo "Build number: $BUILD_NUMBER"
          echo "Tag: $TAG"

      - name: Check if version changed on push
        if: github.event_name == 'push'
        id: version_changed
        run: |
          OLD_VERSION=$(git show HEAD~1:pubspec.yaml | grep '^version:' | sed 's/version:[[:space:]]*//' || true)
          NEW_VERSION="${{ steps.version.outputs.version }}"

          echo "Old version: $OLD_VERSION"
          echo "New version: $NEW_VERSION"

          if [ "$OLD_VERSION" = "$NEW_VERSION" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Stop if pubspec.yaml changed but version stayed the same
        if: github.event_name == 'push' && steps.version_changed.outputs.changed != 'true'
        run: |
          echo "pubspec.yaml changed, but the version stayed the same. No release created."
          exit 0

      - name: Check if tag already exists
        run: |
          git fetch --tags

          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.version.outputs.tag }} already exists. Release already exists or was already built."
            exit 1
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.7.12"
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze project
        run: flutter analyze

      - name: Run tests
        run: |
          if [ -d "test" ]; then
            flutter test
          else
            echo "No test directory found. Skipping tests."
          fi

      - name: Build release APK
        run: flutter build apk --release

      - name: Prepare release files
        run: |
          mkdir -p release

          cp build/app/outputs/flutter-apk/app-release.apk \
             release/dewa_app-${{ steps.version.outputs.version }}.apk

      - name: Create git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            release/*.apk \
            --title "Release ${{ steps.version.outputs.version }}" \
            --notes "Flutter release build for version ${{ steps.version.outputs.version }}"