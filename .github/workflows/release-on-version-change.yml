name: Release on Flutter version change

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Optional: Version aus pubspec.yaml verwenden, leer lassen"
        required: false
        type: string

  push:
    branches:
      - main
    paths:
      - pubspec.yaml

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check whether pubspec version changed
        id: version_changed
        run: |
          OLD_VERSION=$(git show HEAD~1:pubspec.yaml | grep '^version:' | sed 's/version:[[:space:]]*//')
          NEW_VERSION=$(grep '^version:' pubspec.yaml | sed 's/version:[[:space:]]*//')

          echo "old=$OLD_VERSION"
          echo "new=$NEW_VERSION"

          if [ "$OLD_VERSION" = "$NEW_VERSION" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
            echo "tag=v$NEW_VERSION" >> "$GITHUB_OUTPUT"
          fi

      - name: Stop if version did not change
        if: steps.version_changed.outputs.changed != 'true'
        run: |
          echo "pubspec.yaml changed, but version stayed the same. No release needed."

      - name: Stop if tag already exists
        if: steps.version_changed.outputs.changed == 'true'
        run: |
          if git rev-parse "${{ steps.version_changed.outputs.tag }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.version_changed.outputs.tag }} already exists. Nothing to release."
            exit 1
          fi

      - name: Setup Java
        if: steps.version_changed.outputs.changed == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Flutter
        if: steps.version_changed.outputs.changed == 'true'
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.7.12"
          channel: stable
          cache: true

      - name: Install dependencies
        if: steps.version_changed.outputs.changed == 'true'
        run: flutter pub get

      - name: Analyze
        if: steps.version_changed.outputs.changed == 'true'
        run: flutter analyze

      - name: Run tests
        if: steps.version_changed.outputs.changed == 'true'
        run: flutter test

      - name: Build release APK
        if: steps.version_changed.outputs.changed == 'true'
        run: flutter build apk --release

      - name: Rename APK
        if: steps.version_changed.outputs.changed == 'true'
        run: |
          mkdir -p release
          cp build/app/outputs/flutter-apk/app-release.apk \
             release/dewa_app-${{ steps.version_changed.outputs.version }}.apk

      - name: Create git tag
        if: steps.version_changed.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version_changed.outputs.tag }}"
          git push origin "${{ steps.version_changed.outputs.tag }}"

      - name: Create GitHub release
        if: steps.version_changed.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version_changed.outputs.tag }}" \
            release/*.apk \
            --title "Release ${{ steps.version_changed.outputs.tag }}" \
            --generate-notes
