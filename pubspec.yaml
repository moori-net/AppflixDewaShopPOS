name: dewa_app
description: POS app for DeliveryWare
publish_to: "none" # Remove this line if you wish to publish to pub.dev
version: 6.7.3+4

environment:
  sdk: ">=2.17.6 <3.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.17.0
  equatable: ^2.0.3
  chopper: ^6.0.0
  http: ^0.13.0
  logging: ^1.0.2
  bloc: ^8.1.0
  flutter_bloc: ^8.0.1
  package_info_plus: ^3.0.2
  google_fonts: ^4.0.3
  flex_color_scheme: ^6.0.1
  shared_preferences: ^2.0.8
  get_it: ^7.2.0
  flutter_phoenix: ^1.1.0
  oauth2:
    git:
      url: https://github.com/moorl/oauth2
      ref: master
  open_settings: ^2.0.2
  connectivity_plus: ^3.0.2
  badges: ^3.0.2
  just_audio: ^0.9.29
  blue_thermal_printer: any
  image_picker: ^0.8.6
  path_provider: ^2.0.11
  image: ^4.0.15
  wakelock: ^0.6.2
  sentry_flutter: ^6.18.0
  mobile_scanner: ^3.0.0
  bluetooth_thermal_printer: ^0.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  build_runner: ^2.2.1
  chopper_generator: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/audio/
